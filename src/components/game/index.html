<li class="game game__wrapper">
  <article class="game__article">
    <a
      class="game__link"
      href="@@link"
      target="_blank"
      rel="noopener noreferrer"
    ></a>

    <picture class="game__picture">
      <source srcset="@@src.webp" type="image/webp" />
      <img src="@@src.jpg" alt="@@title" />
    </picture>

    <footer class="game__footer">
      <h2 class="game__title">@@title</h2>
    </footer>
  </article>
</li>
